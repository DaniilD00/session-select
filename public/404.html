<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ready Pixel Go</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License — https://github.com/rafgraph/spa-github-pages
      // Redirects deep links to index.html (served at 200) so the SPA router
      // can take over, instead of leaving GitHub Pages' 404 response.
      // Custom apex domain serves from the root, so keep 0 path segments.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
